<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="#F0FDF4"/>
  <!-- Title -->
  <text x="200" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1E3A5F">Zeitstrahl der Europäischen Integration</text>
  <!-- Timeline line -->
  <line x1="40" y1="70" x2="40" y2="280" stroke="#94A3B8" stroke-width="3"/>
  <!-- 1951: EGKS -->
  <circle cx="40" cy="80" r="6" fill="#2563EB"/>
  <rect x="60" y="62" width="320" height="35" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
  <text x="75" y="78" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1E40AF">1951</text>
  <text x="120" y="78" font-family="Arial, sans-serif" font-size="9" fill="#1E40AF">EGKS (Montanunion)</text>
  <text x="75" y="91" font-family="Arial, sans-serif" font-size="7" fill="#64748B">Kohle und Stahl &#8211; 6 Gründerstaaten</text>
  <!-- 1957: Römische Verträge / EWG -->
  <circle cx="40" cy="115" r="6" fill="#16A34A"/>
  <rect x="60" y="97" width="320" height="35" rx="8" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/>
  <text x="75" y="113" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#166534">1957</text>
  <text x="120" y="113" font-family="Arial, sans-serif" font-size="9" fill="#166534">Römische Verträge &#8594; EWG</text>
  <text x="75" y="126" font-family="Arial, sans-serif" font-size="7" fill="#64748B">Europäische Wirtschaftsgemeinschaft</text>
  <!-- 1967: EG -->
  <circle cx="40" cy="150" r="6" fill="#CA8A04"/>
  <rect x="60" y="132" width="320" height="35" rx="8" fill="#FEF3C7" stroke="#CA8A04" stroke-width="1.5"/>
  <text x="75" y="148" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#92400E">1967</text>
  <text x="120" y="148" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Europäische Gemeinschaft (EG)</text>
  <text x="75" y="161" font-family="Arial, sans-serif" font-size="7" fill="#64748B">Fusion der drei Gemeinschaften (EGKS, EWG, Euratom)</text>
  <!-- 1993: EU -->
  <circle cx="40" cy="185" r="6" fill="#7C3AED"/>
  <rect x="60" y="167" width="320" height="35" rx="8" fill="#F3E8FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="75" y="183" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#5B21B6">1993</text>
  <text x="120" y="183" font-family="Arial, sans-serif" font-size="9" fill="#5B21B6">Europäische Union (EU)</text>
  <text x="75" y="196" font-family="Arial, sans-serif" font-size="7" fill="#64748B">Vertrag von Maastricht &#8211; politische Union</text>
  <!-- 2002: Euro -->
  <circle cx="40" cy="220" r="6" fill="#DC2626"/>
  <rect x="60" y="202" width="320" height="35" rx="8" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5"/>
  <text x="75" y="218" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#991B1B">2002</text>
  <text x="120" y="218" font-family="Arial, sans-serif" font-size="9" fill="#991B1B">Euro-Bargeld eingeführt</text>
  <text x="75" y="231" font-family="Arial, sans-serif" font-size="7" fill="#64748B">Gemeinsame Währung in der Eurozone</text>
  <!-- Today -->
  <circle cx="40" cy="255" r="6" fill="#0891B2"/>
  <rect x="60" y="237" width="320" height="35" rx="8" fill="#CFFAFE" stroke="#0891B2" stroke-width="1.5"/>
  <text x="75" y="253" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#155E75">Heute</text>
  <text x="120" y="253" font-family="Arial, sans-serif" font-size="9" fill="#155E75">27 Mitgliedstaaten</text>
  <text x="75" y="266" font-family="Arial, sans-serif" font-size="7" fill="#64748B">Von 6 auf 27 Staaten gewachsen</text>
</svg>