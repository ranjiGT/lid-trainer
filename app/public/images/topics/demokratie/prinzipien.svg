<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="#F0FDF4"/>
  <!-- Title -->
  <text x="200" y="28" text-anchor="middle" font-size="14" fill="#1F2937" font-weight="bold">Merkmale der Demokratie</text>
  <!-- Central circle: Volk -->
  <circle cx="200" cy="155" r="40" fill="#2563EB" opacity="0.15" stroke="#2563EB" stroke-width="2"/>
  <text x="200" y="150" text-anchor="middle" font-size="13" fill="#1E40AF" font-weight="bold">Volk</text>
  <text x="200" y="165" text-anchor="middle" font-size="9" fill="#1E40AF">Art. 20 GG</text>
  <!-- Branch 1: Freie Wahlen (top) -->
  <line x1="200" y1="115" x2="200" y2="65" stroke="#2563EB" stroke-width="1.5"/>
  <rect x="140" y="42" width="120" height="28" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="200" y="60" text-anchor="middle" font-size="9" fill="#1E40AF" font-weight="bold">Freie Wahlen</text>
  <!-- Ballot box icon -->
  <rect x="152" y="48" width="12" height="14" rx="2" fill="#3B82F6"/>
  <rect x="155" y="50" width="6" height="2" rx="1" fill="#DBEAFE"/>
  <!-- Branch 2: Mehrparteiensystem (top-right) -->
  <line x1="230" y1="125" x2="305" y2="75" stroke="#10B981" stroke-width="1.5"/>
  <rect x="265" y="55" width="120" height="28" rx="8" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
  <text x="325" y="73" text-anchor="middle" font-size="9" fill="#065F46" font-weight="bold">Mehrparteiensystem</text>
  <!-- Branch 3: Meinungsfreiheit (right) -->
  <line x1="240" y1="155" x2="310" y2="155" stroke="#F59E0B" stroke-width="1.5"/>
  <rect x="265" y="138" width="120" height="34" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="325" y="153" text-anchor="middle" font-size="8" fill="#92400E" font-weight="bold">Meinungs- &amp;</text>
  <text x="325" y="165" text-anchor="middle" font-size="8" fill="#92400E" font-weight="bold">Pressefreiheit</text>
  <!-- Branch 4: Unabhängige Gerichte (bottom-right) -->
  <line x1="230" y1="185" x2="305" y2="230" stroke="#8B5CF6" stroke-width="1.5"/>
  <rect x="260" y="218" width="130" height="28" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="325" y="236" text-anchor="middle" font-size="9" fill="#5B21B6" font-weight="bold">Unabh&#228;ngige Gerichte</text>
  <!-- Scales icon -->
  <line x1="275" y1="228" x2="275" y2="238" stroke="#5B21B6" stroke-width="1.5"/>
  <line x1="268" y1="232" x2="282" y2="232" stroke="#5B21B6" stroke-width="1.5"/>
  <!-- Branch 5: Gewaltenteilung (bottom) -->
  <line x1="200" y1="195" x2="200" y2="245" stroke="#EF4444" stroke-width="1.5"/>
  <rect x="140" y="242" width="120" height="28" rx="8" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="200" y="260" text-anchor="middle" font-size="9" fill="#991B1B" font-weight="bold">Gewaltenteilung</text>
  <!-- Branch 6: Grundrechte (bottom-left) -->
  <line x1="170" y1="185" x2="95" y2="230" stroke="#EC4899" stroke-width="1.5"/>
  <rect x="20" y="218" width="120" height="28" rx="8" fill="#FCE7F3" stroke="#EC4899" stroke-width="1.5"/>
  <text x="80" y="236" text-anchor="middle" font-size="9" fill="#9D174D" font-weight="bold">Grundrechte</text>
  <!-- Book icon -->
  <rect x="35" y="224" width="10" height="14" rx="2" fill="#EC4899"/>
  <line x1="40" y1="225" x2="40" y2="237" stroke="#FCE7F3" stroke-width="1"/>
  <!-- Branch 7: Versammlungsfreiheit (left) -->
  <line x1="160" y1="155" x2="90" y2="155" stroke="#06B6D4" stroke-width="1.5"/>
  <rect x="15" y="138" width="120" height="34" rx="8" fill="#CFFAFE" stroke="#06B6D4" stroke-width="1.5"/>
  <text x="75" y="153" text-anchor="middle" font-size="8" fill="#155E75" font-weight="bold">Versammlungs-</text>
  <text x="75" y="165" text-anchor="middle" font-size="8" fill="#155E75" font-weight="bold">freiheit</text>
  <!-- Branch 8: Rechtsstaatlichkeit (top-left) -->
  <line x1="170" y1="125" x2="95" y2="75" stroke="#84CC16" stroke-width="1.5"/>
  <rect x="15" y="55" width="120" height="28" rx="8" fill="#ECFCCB" stroke="#84CC16" stroke-width="1.5"/>
  <text x="75" y="73" text-anchor="middle" font-size="9" fill="#3F6212" font-weight="bold">Rechtsstaatlichkeit</text>
</svg>