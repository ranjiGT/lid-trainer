<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 340">
  <style>
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }
    .title { animation: fadeIn 0.5s ease-out both; }
    .card { animation: scaleIn 0.45s ease-out both; }
    .c1 { animation-delay: 0.2s; }
    .c2 { animation-delay: 0.35s; }
    .c3 { animation-delay: 0.5s; }
    .c4 { animation-delay: 0.65s; }
    .c5 { animation-delay: 0.8s; }
    .c6 { animation-delay: 0.95s; }
    .footer { animation: fadeSlideUp 0.5s ease-out both; animation-delay: 1.2s; }
  </style>

  <rect width="500" height="340" rx="16" fill="#F0FDF4"/>

  <!-- Title -->
  <text x="250" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#14532D" class="title">Parteienlandschaft in Deutschland</text>
  <text x="250" y="44" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#166534" class="title">Mehrparteiensystem &#x2013; Art. 21 Grundgesetz</text>

  <!-- Row 1: 3 party cards -->
  <!-- CDU/CSU -->
  <g class="card c1">
    <rect x="18" y="60" width="148" height="100" rx="10" fill="#14532D"/>
    <circle cx="92" cy="86" r="14" fill="#16A34A"/>
    <text x="92" y="92" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14">&#x1F3DB;&#xFE0F;</text>
    <text x="92" y="112" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="white">CDU / CSU</text>
    <text x="92" y="126" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#BBF7D0">Christlich-konservativ</text>
    <text x="92" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#BBF7D0">Gr&#xF6;&#xDF;te Volkspartei</text>
    <text x="92" y="152" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#16A34A">Mitte-rechts</text>
  </g>

  <!-- SPD -->
  <g class="card c2">
    <rect x="176" y="60" width="148" height="100" rx="10" fill="#16A34A"/>
    <circle cx="250" cy="86" r="14" fill="#14532D"/>
    <text x="250" y="92" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14">&#x1F3E4;</text>
    <text x="250" y="112" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="white">SPD</text>
    <text x="250" y="126" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#DCFCE7">Sozialdemokratisch</text>
    <text x="250" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#DCFCE7">&#xC4;lteste dt. Partei (1863)</text>
    <text x="250" y="152" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#DCFCE7">Mitte-links</text>
  </g>

  <!-- Grüne -->
  <g class="card c3">
    <rect x="334" y="60" width="148" height="100" rx="10" fill="#14532D"/>
    <circle cx="408" cy="86" r="14" fill="#16A34A"/>
    <text x="408" y="92" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14">&#x1F33F;</text>
    <text x="408" y="112" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="white">B&#xFC;ndnis 90/Gr&#xFC;ne</text>
    <text x="408" y="126" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#BBF7D0">Umwelt &amp; Klimaschutz</text>
    <text x="408" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#BBF7D0">Gegr. 1980</text>
    <text x="408" y="152" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#16A34A">Links / Mitte</text>
  </g>

  <!-- Row 2: 3 party cards -->
  <!-- FDP -->
  <g class="card c4">
    <rect x="18" y="172" width="148" height="100" rx="10" fill="#16A34A"/>
    <circle cx="92" cy="198" r="14" fill="#14532D"/>
    <text x="92" y="204" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14">&#x1F4CA;</text>
    <text x="92" y="224" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="white">FDP</text>
    <text x="92" y="238" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#DCFCE7">Liberal</text>
    <text x="92" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#DCFCE7">Freie Marktwirtschaft</text>
    <text x="92" y="264" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#DCFCE7">Mitte / Mitte-rechts</text>
  </g>

  <!-- Die Linke -->
  <g class="card c5">
    <rect x="176" y="172" width="148" height="100" rx="10" fill="#14532D"/>
    <circle cx="250" cy="198" r="14" fill="#16A34A"/>
    <text x="250" y="204" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14">&#x270A;</text>
    <text x="250" y="224" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="white">Die Linke</text>
    <text x="250" y="238" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#BBF7D0">Soziale Gerechtigkeit</text>
    <text x="250" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#BBF7D0">Nachfolgerin d. PDS</text>
    <text x="250" y="264" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#16A34A">Links</text>
  </g>

  <!-- AfD -->
  <g class="card c6">
    <rect x="334" y="172" width="148" height="100" rx="10" fill="#16A34A"/>
    <circle cx="408" cy="198" r="14" fill="#14532D"/>
    <text x="408" y="204" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14">&#x1F5E8;&#xFE0F;</text>
    <text x="408" y="224" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="white">AfD</text>
    <text x="408" y="238" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#DCFCE7">Rechtspopulistisch</text>
    <text x="408" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#DCFCE7">Gegr. 2013</text>
    <text x="408" y="264" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#DCFCE7">Rechts</text>
  </g>

  <!-- Footer -->
  <g class="footer">
    <rect x="18" y="286" width="464" height="40" rx="8" fill="#DCFCE7" stroke="#16A34A" stroke-width="1"/>
    <text x="250" y="304" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#14532D">&#x1F4DC; Art. 21 GG: Parteien wirken bei der politischen Willensbildung des Volkes mit.</text>
    <text x="250" y="318" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#166534">Jeder B&#xFC;rger darf eine Partei gr&#xFC;nden &#x2022; Parteien m&#xFC;ssen demokratisch organisiert sein</text>
  </g>
</svg>