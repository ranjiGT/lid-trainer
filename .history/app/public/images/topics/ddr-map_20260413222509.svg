  <path class="west" d="M130,160 L160,155 L190,160 L210,155 L210,180 L215,200 L200,225 L185,245 L165,250 L145,245 L140,220 L145,200 L140,180 Z"/>
  <text class="label" x="172" y="210">Hessen</text>

