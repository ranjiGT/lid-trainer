<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="#F5F3FF"/>
  <!-- Kabinettssitzung - conference room scene -->
  <!-- Long table -->
  <rect x="60" y="120" width="280" height="80" rx="8" fill="#92400E" opacity="0.7"/>
  <rect x="65" y="125" width="270" height="70" rx="6" fill="#B45309" opacity="0.4"/>
  <!-- Documents on table -->
  <rect x="120" y="140" width="20" height="28" rx="2" fill="white" stroke="#D1D5DB" stroke-width="0.5"/>
  <rect x="190" y="138" width="20" height="28" rx="2" fill="white" stroke="#D1D5DB" stroke-width="0.5"/>
  <rect x="260" y="140" width="20" height="28" rx="2" fill="white" stroke="#D1D5DB" stroke-width="0.5"/>
  <!-- Kanzler (head of table) -->
  <circle cx="200" cy="90" r="18" fill="#F59E0B"/>
  <rect x="186" y="108" width="28" height="16" rx="4" fill="#1E40AF"/>
  <!-- Ministers - left side -->
  <circle cx="100" cy="100" r="14" fill="#F59E0B"/>
  <rect x="89" y="114" width="22" height="12" rx="3" fill="#6B7280"/>
  <circle cx="155" cy="95" r="14" fill="#F59E0B"/>
  <rect x="144" y="109" width="22" height="12" rx="3" fill="#6B7280"/>
  <!-- Ministers - right side -->
  <circle cx="245" cy="95" r="14" fill="#F59E0B"/>
  <rect x="234" y="109" width="22" height="12" rx="3" fill="#6B7280"/>
  <circle cx="300" cy="100" r="14" fill="#F59E0B"/>
  <rect x="289" y="114" width="22" height="12" rx="3" fill="#6B7280"/>
  <!-- Ministers - bottom side -->
  <circle cx="120" cy="220" r="14" fill="#F59E0B"/>
  <rect x="109" y="200" width="22" height="12" rx="3" fill="#6B7280"/>
  <circle cx="200" cy="225" r="14" fill="#F59E0B"/>
  <rect x="189" y="205" width="22" height="12" rx="3" fill="#6B7280"/>
  <circle cx="280" cy="220" r="14" fill="#F59E0B"/>
  <rect x="269" y="200" width="22" height="12" rx="3" fill="#6B7280"/>
  <!-- Speech bubble from Kanzler -->
  <rect x="230" y="50" width="90" height="30" rx="8" fill="white" stroke="#1E40AF" stroke-width="1.5"/>
  <text x="275" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1E40AF">Beschluss!</text>
  <polygon points="240,80 245,80 235,90" fill="white" stroke="#1E40AF" stroke-width="1.5"/>
  <!-- Bundesadler watermark -->
  <text x="200" y="170" text-anchor="middle" font-size="20" opacity="0.1">🦅</text>
  <!-- Label -->
  <text x="200" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#5B21B6">Kabinettssitzung – Regierungsarbeit</text>
</svg>