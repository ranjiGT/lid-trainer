<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="#F0FDF4"/>
  <!-- Title -->
  <text x="200" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1E3A5F">Stimmenverteilung im Bundesrat</text>
  <!-- Legend -->
  <rect x="20" y="42" width="10" height="10" rx="2" fill="#1E40AF"/>
  <text x="35" y="51" font-family="Arial, sans-serif" font-size="8" fill="#475569">6 Stimmen</text>
  <rect x="90" y="42" width="10" height="10" rx="2" fill="#2563EB"/>
  <text x="105" y="51" font-family="Arial, sans-serif" font-size="8" fill="#475569">5 Stimmen</text>
  <rect x="160" y="42" width="10" height="10" rx="2" fill="#60A5FA"/>
  <text x="175" y="51" font-family="Arial, sans-serif" font-size="8" fill="#475569">4 Stimmen</text>
  <rect x="230" y="42" width="10" height="10" rx="2" fill="#93C5FD"/>
  <text x="245" y="51" font-family="Arial, sans-serif" font-size="8" fill="#475569">3 Stimmen</text>
  <!-- 6 Stimmen states -->
  <rect x="15" y="62" width="88" height="28" rx="6" fill="#1E40AF"/>
  <text x="59" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white">NRW (6)</text>
  <rect x="108" y="62" width="88" height="28" rx="6" fill="#1E40AF"/>
  <text x="152" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white">Bayern (6)</text>
  <rect x="201" y="62" width="88" height="28" rx="6" fill="#1E40AF"/>
  <text x="245" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white">Baden-W. (6)</text>
  <rect x="294" y="62" width="88" height="28" rx="6" fill="#1E40AF"/>
  <text x="338" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white">Nieders. (6)</text>
  <!-- 5 Stimmen states -->
  <rect x="15" y="95" width="88" height="28" rx="6" fill="#2563EB"/>
  <text x="59" y="113" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white">Hessen (5)</text>
  <rect x="108" y="95" width="88" height="28" rx="6" fill="#2563EB"/>
  <text x="152" y="113" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white">Sachsen (5)</text>
  <rect x="201" y="95" width="88" height="28" rx="6" fill="#2563EB"/>
  <text x="245" y="113" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white">R.-Pfalz (5)</text>
  <rect x="294" y="95" width="88" height="28" rx="6" fill="#2563EB"/>
  <text x="338" y="113" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white">Berlin (5)</text>
  <!-- 4 Stimmen states -->
  <rect x="15" y="128" width="58" height="28" rx="6" fill="#60A5FA"/>
  <text x="44" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="white">S.-Anh. (4)</text>
  <rect x="78" y="128" width="58" height="28" rx="6" fill="#60A5FA"/>
  <text x="107" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="white">Thür. (4)</text>
  <rect x="141" y="128" width="58" height="28" rx="6" fill="#60A5FA"/>
  <text x="170" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="white">Brand. (4)</text>
  <rect x="204" y="128" width="58" height="28" rx="6" fill="#60A5FA"/>
  <text x="233" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="white">Schl.-H. (4)</text>
  <rect x="267" y="128" width="58" height="28" rx="6" fill="#60A5FA"/>
  <text x="296" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="white">M.-V. (4)</text>
  <rect x="330" y="128" width="55" height="28" rx="6" fill="#60A5FA"/>
  <text x="358" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="white">Saarl. (4)</text>
  <!-- 3 Stimmen states -->
  <rect x="110" y="161" width="58" height="28" rx="6" fill="#93C5FD"/>
  <text x="139" y="179" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#1E3A5F">Hamburg (3)</text>
  <rect x="173" y="161" width="58" height="28" rx="6" fill="#93C5FD"/>
  <text x="202" y="179" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#1E3A5F">Bremen (3)</text>
  <!-- Total -->
  <rect x="100" y="200" width="200" height="35" rx="10" fill="#DCFCE7" stroke="#16A34A" stroke-width="2"/>
  <text x="200" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#166534">= 69 Stimmen gesamt</text>
  <!-- Absolute majority note -->
  <rect x="80" y="248" width="240" height="35" rx="8" fill="#F3E8FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="200" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#5B21B6">Absolute Mehrheit: 35 Stimmen</text>
  <text x="200" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#7C3AED">nötig für Zustimmungsgesetze</text>
</svg>