<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="600" viewBox="0 0 400 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="600" fill="#f8f8f8"/>
  <defs>
    <style>
      .west { fill: #e0e0e0; stroke: #888; stroke-width: 1.5; }
      .ddr { fill: #b3c6e7; stroke: #3a5ba0; stroke-width: 1.5; }
      .berlin { fill: #3a5ba0; stroke: #fff; stroke-width: 1.5; }
      .label { font-family: Arial, sans-serif; font-size: 12px; fill: #222; text-anchor: middle; }
      .label-ddr { font-family: Arial, sans-serif; font-size: 12px; fill: #3a5ba0; text-anchor: middle; font-weight: bold; }
      .label-berlin { font-family: Arial, sans-serif; font-size: 12px; fill: #fff; text-anchor: middle; font-weight: bold; }
      .legend-text { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
    </style>
  </defs>

  <!-- West Germany (approximate) -->
  <path class="west" d="M 60 150 Q 80 100 150 80 Q 180 60 200 60 Q 220 60 250 120 Q 280 190 310 250 Q 330 310 340 370 Q 350 430 320 470 Q 290 510 250 540 Q 210 570 180 520 Q 150 470 120 420 Q 90 370 110 300 Q 130 230 150 160 Q 155 145 170 120 Q 180 100 200 100 Q 220 100 240 120 Q 260 140 280 190 Q 300 240 310 250 Q 320 260 330 310 Q 340 360 320 410 Q 300 460 250 510 Q 200 560 180 520 Q 160 480 140 410 Q 120 340 140 320 Q 160 300 180 270 Q 200 240 220 220 Q 240 200 260 180 Q 280 160 300 140 Q 320 120 340 100 Q 360 80 380 60"/>

  <!-- DDR region (East Germany, highlighted) -->
  <path class="ddr" d="M 200 120 Q 180 150 170 210 Q 160 270 140 320 Q 120 370 140 410 Q 160 450 190 490 Q 220 530 250 510 Q 280 490 300 450 Q 320 410 310 370 Q 300 330 280 290 Q 260 250 240 200 Q 220 150 200 120 Z"/>

  <!-- Berlin (small circle for clarity) -->
  <circle class="berlin" cx="255" cy="210" r="12"/>
  <text class="label-berlin" x="255" y="215">Berlin</text>

  <!-- Labels -->
  <text class="label-ddr" x="250" y="180">DDR</text>
  <text class="label" x="270" y="570">BRD</text>

  <!-- Legend -->
  <rect x="20" y="520" width="20" height="14" rx="2" class="ddr"/>
  <text class="legend-text" x="48" y="532">DDR (Ostdeutschland)</text>
  <rect x="20" y="540" width="20" height="14" rx="2" class="west"/>
  <text class="legend-text" x="48" y="552">BRD (Westdeutschland)</text>
  <rect x="20" y="560" width="20" height="14" rx="2" class="berlin"/>
  <text class="legend-text" x="48" y="572">Berlin</text>
</svg>
  <text class="label-ddr" x="240" y="192">Anhalt</text>

  <!-- Nordrhein-Westfalen -->
  <path class="west" d="M60,155 L90,130 L110,145 L130,160 L140,180 L145,200 L140,220 L125,235 L100,240 L75,230 L55,210 L50,185 Z"/>
  <text class="label" x="100" y="195">Nordrhein-</text>
  <text class="label" x="100" y="207">Westfalen</text>

