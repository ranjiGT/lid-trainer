<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 720" width="700" height="720">
  <defs>
    <style>
      .de { fill: #f59e0b; stroke: #78350f; stroke-width: 1; stroke-linejoin: round; }
      .nb { fill: #d1d5db; stroke: #6b7280; stroke-width: 0.7; stroke-linejoin: round; }
      .sea { fill: #93c5fd; fill-opacity: 0.35; }
      .lbl { font-family: -apple-system, system-ui, sans-serif; font-size: 14px; font-weight: 700; fill: #1f2937; }
      .lbl-sm { font-family: -apple-system, system-ui, sans-serif; font-size: 11px; font-weight: 600; fill: #374151; }
      .lbl-bg { fill: #fff; fill-opacity: 0.9; rx: 3; ry: 3; }
      .de-lbl { font-family: -apple-system, system-ui, sans-serif; font-size: 20px; font-weight: 800; fill: #78350f; text-anchor: middle; }
      .legend { font-family: -apple-system, system-ui, sans-serif; font-size: 12px; fill: #374151; }
    </style>
  </defs>

