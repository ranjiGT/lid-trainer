<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 340">
  <rect width="480" height="340" rx="16" fill="#F0FDF4"/>

  <!-- Title -->
  <text x="240" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#14532D">Die wichtigsten Grundrechte</text>
  <text x="240" y="44" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#166534">Grundgesetz f&#xFC;r die Bundesrepublik Deutschland</text>

  <!-- Article cards — 2 columns, 4 rows -->

  <!-- Art. 1 -->
  <rect x="20" y="56" width="215" height="58" rx="8" fill="#14532D"/>
  <text x="32" y="76" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#BBF7D0">Art. 1</text>
  <text x="32" y="92" font-family="system-ui, sans-serif" font-size="10" fill="white">Die W&#xFC;rde des Menschen</text>
  <text x="32" y="106" font-family="system-ui, sans-serif" font-size="10" fill="white">ist unantastbar.</text>

  <!-- Art. 2 -->
  <rect x="245" y="56" width="215" height="58" rx="8" fill="#16A34A"/>
  <text x="257" y="76" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="white">Art. 2</text>
  <text x="257" y="92" font-family="system-ui, sans-serif" font-size="10" fill="white">Freie Entfaltung</text>
  <text x="257" y="106" font-family="system-ui, sans-serif" font-size="10" fill="white">der Pers&#xF6;nlichkeit</text>

  <!-- Art. 3 -->
  <rect x="20" y="122" width="215" height="58" rx="8" fill="#BBF7D0" stroke="#16A34A" stroke-width="1.5"/>
  <text x="32" y="142" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#14532D">Art. 3</text>
  <text x="32" y="158" font-family="system-ui, sans-serif" font-size="10" fill="#14532D">Alle Menschen sind vor</text>
  <text x="32" y="172" font-family="system-ui, sans-serif" font-size="10" fill="#14532D">dem Gesetz gleich.</text>

  <!-- Art. 4 -->
  <rect x="245" y="122" width="215" height="58" rx="8" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/>
  <text x="257" y="142" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#14532D">Art. 4</text>
  <text x="257" y="158" font-family="system-ui, sans-serif" font-size="10" fill="#14532D">Glaubens- und</text>
  <text x="257" y="172" font-family="system-ui, sans-serif" font-size="10" fill="#14532D">Gewissensfreiheit</text>

  <!-- Art. 5 -->
  <rect x="20" y="188" width="215" height="58" rx="8" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/>
  <text x="32" y="208" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#14532D">Art. 5</text>
  <text x="32" y="224" font-family="system-ui, sans-serif" font-size="10" fill="#14532D">Meinungs- und</text>
  <text x="32" y="238" font-family="system-ui, sans-serif" font-size="10" fill="#14532D">Pressefreiheit</text>

  <!-- Art. 8 -->
  <rect x="245" y="188" width="215" height="58" rx="8" fill="#BBF7D0" stroke="#16A34A" stroke-width="1.5"/>
  <text x="257" y="208" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#14532D">Art. 8</text>
  <text x="257" y="224" font-family="system-ui, sans-serif" font-size="10" fill="#14532D">Versammlungsfreiheit</text>
  <text x="257" y="238" font-family="system-ui, sans-serif" font-size="10" fill="#166534">(friedlich, ohne Waffen)</text>

  <!-- Art. 20 -->
  <rect x="20" y="254" width="215" height="72" rx="8" fill="#16A34A"/>
  <text x="32" y="274" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="white">Art. 20</text>
  <text x="32" y="290" font-family="system-ui, sans-serif" font-size="10" fill="white">Alle Staatsgewalt geht</text>
  <text x="32" y="304" font-family="system-ui, sans-serif" font-size="10" fill="white">vom Volke aus.</text>
  <text x="32" y="318" font-family="system-ui, sans-serif" font-size="9" fill="#BBF7D0">Demokratie, Sozialstaat, Rechtsstaat</text>

  <!-- Art. 79 Abs. 3 -->
  <rect x="245" y="254" width="215" height="72" rx="8" fill="#FEF9C3" stroke="#CA8A04" stroke-width="1.5"/>
  <text x="257" y="274" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#854D0E">Art. 79 Abs. 3</text>
  <text x="257" y="290" font-family="system-ui, sans-serif" font-size="10" fill="#854D0E">Ewigkeitsklausel:</text>
  <text x="257" y="306" font-family="system-ui, sans-serif" font-size="10" fill="#854D0E">Art. 1 und Art. 20 d&#xFC;rfen</text>
  <text x="257" y="320" font-family="system-ui, sans-serif" font-size="10" fill="#854D0E">nicht ge&#xE4;ndert werden!</text>
</svg>