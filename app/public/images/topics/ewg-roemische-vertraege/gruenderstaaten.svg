<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 400">
  <rect width="480" height="400" rx="16" fill="#F0FDF4"/>

  <!-- Title -->
  <text x="240" y="26" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#14532D">Die 6 Gründerstaaten der EWG (1957)</text>
  <text x="240" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#166534">Römische Verträge – unterzeichnet am 25. März 1957</text>

  <!-- Central EWG badge -->
  <circle cx="240" cy="210" r="52" fill="#14532D"/>
  <text x="240" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="white">EWG</text>
  <text x="240" y="216" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#BBF7D0">Europäische</text>
  <text x="240" y="227" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#BBF7D0">Wirtschafts-</text>
  <text x="240" y="238" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#BBF7D0">gemeinschaft</text>

  <!-- Connecting lines -->
  <line x1="200" y1="185" x2="140" y2="130" stroke="#16A34A" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="280" y1="185" x2="340" y2="130" stroke="#16A34A" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="198" y1="212" x2="105" y2="224" stroke="#16A34A" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="282" y1="212" x2="375" y2="224" stroke="#16A34A" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="215" y1="245" x2="140" y2="305" stroke="#16A34A" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="265" y1="245" x2="340" y2="305" stroke="#16A34A" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Country 1: Deutschland (top left) -->
  <rect x="50" y="56" width="130" height="78" rx="8" fill="#BBF7D0" stroke="#16A34A" stroke-width="1.5"/>
  <rect x="70" y="62" width="90" height="18" fill="#000000"/>
  <rect x="70" y="80" width="90" height="18" fill="#DD0000"/>
  <rect x="70" y="98" width="90" height="18" fill="#FFCC00"/>
  <rect x="70" y="62" width="90" height="54" rx="3" fill="none" stroke="#666" stroke-width="0.5"/>
  <text x="115" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#14532D">Deutschland</text>

  <!-- Country 2: Frankreich (top right) -->
  <rect x="300" y="56" width="130" height="78" rx="8" fill="#BBF7D0" stroke="#16A34A" stroke-width="1.5"/>
  <rect x="320" y="62" width="30" height="54" fill="#002395"/>
  <rect x="350" y="62" width="30" height="54" fill="#FFFFFF"/>
  <rect x="380" y="62" width="30" height="54" fill="#ED2939"/>
  <rect x="320" y="62" width="90" height="54" rx="3" fill="none" stroke="#666" stroke-width="0.5"/>
  <text x="365" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#14532D">Frankreich</text>

  <!-- Country 3: Belgien (middle left) -->
  <rect x="10" y="188" width="130" height="78" rx="8" fill="#BBF7D0" stroke="#16A34A" stroke-width="1.5"/>
  <rect x="30" y="194" width="30" height="54" fill="#000000"/>
  <rect x="60" y="194" width="30" height="54" fill="#FAE042"/>
  <rect x="90" y="194" width="30" height="54" fill="#ED2939"/>
  <rect x="30" y="194" width="90" height="54" rx="3" fill="none" stroke="#666" stroke-width="0.5"/>
  <text x="75" y="262" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#14532D">Belgien</text>

  <!-- Country 4: Italien (middle right) -->
  <rect x="340" y="188" width="130" height="78" rx="8" fill="#BBF7D0" stroke="#16A34A" stroke-width="1.5"/>
  <rect x="360" y="194" width="30" height="54" fill="#009246"/>
  <rect x="390" y="194" width="30" height="54" fill="#FFFFFF"/>
  <rect x="420" y="194" width="30" height="54" fill="#CE2B37"/>
  <rect x="360" y="194" width="90" height="54" rx="3" fill="none" stroke="#666" stroke-width="0.5"/>
  <text x="405" y="262" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#14532D">Italien</text>

  <!-- Country 5: Luxemburg (bottom left) -->
  <rect x="50" y="298" width="130" height="78" rx="8" fill="#BBF7D0" stroke="#16A34A" stroke-width="1.5"/>
  <rect x="70" y="304" width="90" height="18" fill="#ED2939"/>
  <rect x="70" y="322" width="90" height="18" fill="#FFFFFF"/>
  <rect x="70" y="340" width="90" height="18" fill="#00A1DE"/>
  <rect x="70" y="304" width="90" height="54" rx="3" fill="none" stroke="#666" stroke-width="0.5"/>
  <text x="115" y="372" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#14532D">Luxemburg</text>

  <!-- Country 6: Niederlande (bottom right) -->
  <rect x="300" y="298" width="130" height="78" rx="8" fill="#BBF7D0" stroke="#16A34A" stroke-width="1.5"/>
  <rect x="320" y="304" width="90" height="18" fill="#AE1C28"/>
  <rect x="320" y="322" width="90" height="18" fill="#FFFFFF"/>
  <rect x="320" y="340" width="90" height="18" fill="#21468B"/>
  <rect x="320" y="304" width="90" height="54" rx="3" fill="none" stroke="#666" stroke-width="0.5"/>
  <text x="365" y="372" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#14532D">Niederlande</text>
</svg>
