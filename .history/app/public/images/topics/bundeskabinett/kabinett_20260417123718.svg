<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="#EFF6FF"/>
  <!-- Cabinet table -->
  <ellipse cx="200" cy="170" rx="160" ry="55" fill="#1E3A5F" opacity="0.15"/>
  <ellipse cx="200" cy="170" rx="130" ry="40" fill="#1E3A5F" opacity="0.08"/>
  <!-- Bundeskanzler (center, larger) -->
  <circle cx="200" cy="65" r="22" fill="#F59E0B"/>
  <rect x="184" y="87" width="32" height="38" rx="6" fill="#1E40AF"/>
  <rect x="194" y="87" width="12" height="38" rx="2" fill="#1E3A5F" opacity="0.3"/>
  <!-- Tie -->
  <polygon points="198,87 202,87 201,100 199,100" fill="#DC2626"/>
  <text x="200" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#1E40AF">Kanzler/in</text>
  <!-- Minister 1 -->
  <circle cx="95" cy="105" r="16" fill="#F59E0B"/>
  <rect x="82" y="121" width="26" height="30" rx="5" fill="#6B7280"/>
  <!-- Minister 2 -->
  <circle cx="145" cy="85" r="16" fill="#F59E0B"/>
  <rect x="132" y="101" width="26" height="30" rx="5" fill="#6B7280"/>
  <!-- Minister 3 -->
  <circle cx="255" cy="85" r="16" fill="#F59E0B"/>
  <rect x="242" y="101" width="26" height="30" rx="5" fill="#6B7280"/>
  <!-- Minister 4 -->
  <circle cx="305" cy="105" r="16" fill="#F59E0B"/>
  <rect x="292" y="121" width="26" height="30" rx="5" fill="#6B7280"/>
  <!-- Minister 5 -->
  <circle cx="120" cy="185" r="16" fill="#F59E0B"/>
  <rect x="107" y="201" width="26" height="30" rx="5" fill="#6B7280"/>
  <!-- Minister 6 -->
  <circle cx="200" cy="200" r="16" fill="#F59E0B"/>
  <rect x="187" y="216" width="26" height="30" rx="5" fill="#6B7280"/>
  <!-- Minister 7 -->
  <circle cx="280" cy="185" r="16" fill="#F59E0B"/>
  <rect x="267" y="201" width="26" height="30" rx="5" fill="#6B7280"/>
  <!-- Federal eagle watermark -->
  <text x="200" y="178" text-anchor="middle" font-size="24" opacity="0.15">🦅</text>
  <!-- Label -->
  <text x="200" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E40AF">Bundeskabinett – Kanzler + Minister</text>
</svg>