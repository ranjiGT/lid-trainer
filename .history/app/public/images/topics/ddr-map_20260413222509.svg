  <text class="label" x="250" y="350">Bayern</text>

  <!-- Legend -->
  <rect x="20" y="445" width="20" height="14" rx="2" class="ddr"/>
  <text class="legend-text" x="48" y="457">DDR-Bundesländer / GDR states</text>
  <rect x="20" y="467" width="20" height="14" rx="2" class="west"/>
  <text class="legend-text" x="48" y="479">Westdeutschland / West Germany</text>
  <rect x="20" y="489" width="20" height="14" rx="2" class="berlin"/>
  <text class="legend-text" x="48" y="501">Berlin (geteilt / divided)</text>
</svg>