<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320">
  <style>
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes growLine {
      from { stroke-dashoffset: 380; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes pulse {
      0%, 100% { r: 7; }
      50% { r: 10; }
    }
    @keyframes slideRight {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .evt { animation: fadeSlideUp 0.5s ease-out both; }
    .evt1 { animation-delay: 0.3s; }
    .evt2 { animation-delay: 0.6s; }
    .evt3 { animation-delay: 0.9s; }
    .evt4 { animation-delay: 1.2s; }
    .evt5 { animation-delay: 1.5s; }
    .timeline-line { stroke-dasharray: 380; animation: growLine 1.5s ease-out both; animation-delay: 0.1s; }
    .dot-pulse { animation: pulse 2s ease-in-out infinite; animation-delay: 2s; }
    .arr { animation: fadeIn 0.3s ease-out both; }
    .arr1 { animation-delay: 0.5s; }
    .arr2 { animation-delay: 0.8s; }
    .arr3 { animation-delay: 1.1s; }
    .arr4 { animation-delay: 1.4s; }
    .bottom-title { animation: fadeIn 0.5s ease-out both; animation-delay: 1.8s; }
    .before-box { animation: slideRight 0.5s ease-out both; animation-delay: 2.1s; }
    .after-box { animation: slideRight 0.5s ease-out both; animation-delay: 2.5s; }
    .merge-arrow { animation: fadeIn 0.4s ease-out both; animation-delay: 2.3s; }
  </style>

  <rect width="480" height="320" rx="16" fill="#F0FDF4"/>

  <!-- Title -->
  <text x="240" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#14532D">Von der EG zur EU &#x2013; Zeitstrahl</text>

  <!-- Timeline line -->
  <line x1="50" y1="70" x2="430" y2="70" stroke="#16A34A" stroke-width="3" class="timeline-line"/>

  <!-- 1951 EGKS -->
  <g class="evt evt1">
    <circle cx="70" cy="70" r="5" fill="#14532D"/>
    <text x="70" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#14532D">1951</text>
    <rect x="35" y="98" width="70" height="44" rx="6" fill="#DCFCE7" stroke="#16A34A" stroke-width="1"/>
    <text x="70" y="114" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#14532D">EGKS</text>
    <text x="70" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#166534">6 L&#xE4;nder</text>
    <text x="70" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#166534">Kohle + Stahl</text>
  </g>

  <!-- 1957 EWG + Euratom -->
  <g class="evt evt2">
    <circle cx="160" cy="70" r="5" fill="#14532D"/>
    <text x="160" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#14532D">1957</text>
    <rect x="120" y="98" width="80" height="44" rx="6" fill="#BBF7D0" stroke="#16A34A" stroke-width="1"/>
    <text x="160" y="114" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#14532D">EWG</text>
    <text x="160" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#166534">R&#xF6;mische</text>
    <text x="160" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#166534">Vertr&#xE4;ge</text>
  </g>

  <!-- 1967 EG (highlighted) -->
  <g class="evt evt3">
    <circle cx="250" cy="70" r="7" fill="#16A34A" stroke="#14532D" stroke-width="2" class="dot-pulse"/>
    <text x="250" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#14532D">1967</text>
    <rect x="205" y="98" width="90" height="56" rx="6" fill="#14532D"/>
    <text x="250" y="118" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="white">EG</text>
    <text x="250" y="132" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#BBF7D0">Fusionsvertrag</text>
    <text x="250" y="143" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#BBF7D0">EGKS+EWG+Euratom</text>
    <text x="250" y="152" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#BBF7D0">= eine Gemeinschaft</text>
  </g>

  <!-- 1993 EU -->
  <g class="evt evt4">
    <circle cx="345" cy="70" r="5" fill="#14532D"/>
    <text x="345" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#14532D">1993</text>
    <rect x="310" y="98" width="70" height="44" rx="6" fill="#16A34A"/>
    <text x="345" y="114" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="white">EU</text>
    <text x="345" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#BBF7D0">Maastricht</text>
    <text x="345" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#BBF7D0">12 L&#xE4;nder</text>
  </g>

  <!-- Heute -->
  <g class="evt evt5">
    <circle cx="420" cy="70" r="5" fill="#14532D"/>
    <text x="420" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#14532D">Heute</text>
    <rect x="390" y="98" width="60" height="44" rx="6" fill="#DCFCE7" stroke="#16A34A" stroke-width="1"/>
    <text x="420" y="114" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#14532D">EU-27</text>
    <text x="420" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#166534">Lissabon</text>
    <text x="420" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#166534">2009</text>
  </g>

  <!-- Arrows between boxes -->
  <text x="115" y="124" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#16A34A" class="arr arr1">&#x2192;</text>
  <text x="202" y="124" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#16A34A" class="arr arr2">&#x2192;</text>
  <text x="300" y="124" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#16A34A" class="arr arr3">&#x2192;</text>
  <text x="385" y="124" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#16A34A" class="arr arr4">&#x2192;</text>

  <!-- Bottom section: What changed with the merger -->
  <text x="240" y="186" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#14532D" class="bottom-title">Was &#xE4;nderte der Fusionsvertrag?</text>

  <!-- Before -->
  <g class="before-box">
    <rect x="20" y="198" width="210" height="106" rx="10" fill="#DCFCE7" stroke="#16A34A" stroke-width="1"/>
    <text x="125" y="218" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#14532D">Vorher (3 Gemeinschaften)</text>
    <text x="125" y="236" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#166534">&#x2022; 3 verschiedene Kommissionen</text>
    <text x="125" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#166534">&#x2022; 3 verschiedene Ministerr&#xE4;te</text>
    <text x="125" y="268" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#166534">&#x2022; Getrennte Verwaltungen</text>
    <text x="125" y="284" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#166534">&#x2022; Unterschiedliche Regeln</text>
  </g>

  <!-- Arrow -->
  <text x="240" y="258" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" fill="#14532D" class="merge-arrow">&#x2192;</text>

  <!-- After -->
  <g class="after-box">
    <rect x="250" y="198" width="210" height="106" rx="10" fill="#14532D"/>
    <text x="355" y="218" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="white">Nachher (1 Gemeinschaft)</text>
    <text x="355" y="236" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#BBF7D0">&#x2713; Eine Kommission</text>
    <text x="355" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#BBF7D0">&#x2713; Ein Ministerrat</text>
    <text x="355" y="268" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#BBF7D0">&#x2713; Ein gemeinsamer Haushalt</text>
    <text x="355" y="284" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#BBF7D0">&#x2713; Einheitliche Verwaltung</text>
  </g>
</svg>