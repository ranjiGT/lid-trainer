<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <style>
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }
    .title { animation: fadeIn 0.5s ease-out both; }
    .princ { animation: scaleIn 0.5s ease-out both; }
    .p1 { animation-delay: 0.3s; }
    .p2 { animation-delay: 0.5s; }
    .p3 { animation-delay: 0.7s; }
    .p4 { animation-delay: 0.9s; }
    .p5 { animation-delay: 1.1s; }
    .footer { animation: fadeSlideUp 0.5s ease-out both; animation-delay: 1.4s; }
  </style>

  <rect width="480" height="300" rx="16" fill="#F0FDF4"/>

  <!-- Title -->
  <text x="240" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#14532D" class="title">Die 5 Wahlgrunds&#xE4;tze</text>
  <text x="240" y="44" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#166534" class="title">Artikel 38 Grundgesetz &#x2013; Wahlen in Deutschland sind...</text>

  <!-- 5 principle cards in a row -->
  <!-- 1. Allgemein -->
  <g class="princ p1">
    <rect x="16" y="60" width="84" height="110" rx="10" fill="#14532D"/>
    <text x="58" y="88" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22">&#x1F465;</text>
    <text x="58" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="white">Allgemein</text>
    <text x="58" y="124" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#BBF7D0">Jeder Staats-</text>
    <text x="58" y="136" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#BBF7D0">b&#xFC;rger ab 18</text>
    <text x="58" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#BBF7D0">darf w&#xE4;hlen</text>
    <text x="58" y="164" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#16A34A">&#x2714;</text>
  </g>

  <!-- 2. Unmittelbar -->
  <g class="princ p2">
    <rect x="108" y="60" width="84" height="110" rx="10" fill="#16A34A"/>
    <text x="150" y="88" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22">&#x1F3AF;</text>
    <text x="150" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="white">Unmittelbar</text>
    <text x="150" y="124" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#BBF7D0">W&#xE4;hler w&#xE4;hlen</text>
    <text x="150" y="136" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#BBF7D0">direkt ihre</text>
    <text x="150" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#BBF7D0">Vertreter</text>
    <text x="150" y="164" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#DCFCE7">&#x2714;</text>
  </g>

  <!-- 3. Frei -->
  <g class="princ p3">
    <rect x="200" y="60" width="84" height="110" rx="10" fill="#14532D"/>
    <text x="242" y="88" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22">&#x1F54A;&#xFE0F;</text>
    <text x="242" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="white">Frei</text>
    <text x="242" y="124" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#BBF7D0">Kein Zwang</text>
    <text x="242" y="136" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#BBF7D0">oder Druck</text>
    <text x="242" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#BBF7D0">bei der Wahl</text>
    <text x="242" y="164" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#16A34A">&#x2714;</text>
  </g>

  <!-- 4. Gleich -->
  <g class="princ p4">
    <rect x="292" y="60" width="84" height="110" rx="10" fill="#16A34A"/>
    <text x="334" y="88" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22">&#x2696;&#xFE0F;</text>
    <text x="334" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="white">Gleich</text>
    <text x="334" y="124" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#BBF7D0">Jede Stimme</text>
    <text x="334" y="136" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#BBF7D0">z&#xE4;hlt gleich</text>
    <text x="334" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#BBF7D0">viel</text>
    <text x="334" y="164" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#DCFCE7">&#x2714;</text>
  </g>

  <!-- 5. Geheim -->
  <g class="princ p5">
    <rect x="384" y="60" width="84" height="110" rx="10" fill="#14532D"/>
    <text x="426" y="88" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22">&#x1F512;</text>
    <text x="426" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="white">Geheim</text>
    <text x="426" y="124" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#BBF7D0">Niemand sieht,</text>
    <text x="426" y="136" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#BBF7D0">was du</text>
    <text x="426" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#BBF7D0">gew&#xE4;hlt hast</text>
    <text x="426" y="164" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#16A34A">&#x2714;</text>
  </g>

  <!-- Footer: Wer darf wählen? -->
  <g class="footer">
    <rect x="20" y="190" width="440" height="96" rx="10" fill="#DCFCE7" stroke="#16A34A" stroke-width="1"/>
    <text x="240" y="212" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#14532D">Wer darf w&#xE4;hlen?</text>

    <rect x="36" y="222" width="126" height="50" rx="6" fill="#BBF7D0" stroke="#16A34A" stroke-width="0.5"/>
    <text x="99" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15">&#x1F5F3;&#xFE0F;</text>
    <text x="99" y="254" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" font-weight="bold" fill="#14532D">Bundestagswahl</text>
    <text x="99" y="266" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#166534">Deutsche ab 18</text>

    <rect x="178" y="222" width="126" height="50" rx="6" fill="#BBF7D0" stroke="#16A34A" stroke-width="0.5"/>
    <text x="241" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15">&#x1F3E0;</text>
    <text x="241" y="254" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" font-weight="bold" fill="#14532D">Kommunalwahl</text>
    <text x="241" y="266" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#166534">+ EU-B&#xFC;rger</text>

    <rect x="320" y="222" width="126" height="50" rx="6" fill="#BBF7D0" stroke="#16A34A" stroke-width="0.5"/>
    <text x="383" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15">&#x1F1EA;&#x1F1FA;</text>
    <text x="383" y="254" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" font-weight="bold" fill="#14532D">Europawahl</text>
    <text x="383" y="266" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#166534">alle 5 Jahre</text>
  </g>
</svg>