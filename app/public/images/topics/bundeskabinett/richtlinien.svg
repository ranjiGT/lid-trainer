<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="#FEF9C3"/>
  <!-- Richtlinienkompetenz visualization -->
  <!-- Kanzler at center top -->
  <circle cx="200" cy="55" r="24" fill="#F59E0B"/>
  <rect x="182" y="79" width="36" height="40" rx="6" fill="#1E40AF"/>
  <polygon points="198,79 202,79 201,95 199,95" fill="#DC2626"/>
  <text x="200" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1E40AF">Bundeskanzler/in</text>
  <!-- Richtlinien arrows going down to ministers -->
  <line x1="140" y1="140" x2="80" y2="170" stroke="#CA8A04" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="180" y1="140" x2="160" y2="170" stroke="#CA8A04" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="220" y1="140" x2="240" y2="170" stroke="#CA8A04" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="260" y1="140" x2="320" y2="170" stroke="#CA8A04" stroke-width="2" stroke-dasharray="5,3"/>
  <!-- Minister boxes -->
  <rect x="45" y="175" width="70" height="55" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
  <circle cx="80" cy="192" r="10" fill="#F59E0B"/>
  <rect x="74" y="202" width="12" height="14" rx="3" fill="#6B7280"/>
  <text x="80" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#1E40AF">Finanzen</text>
  <rect x="125" y="175" width="70" height="55" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
  <circle cx="160" cy="192" r="10" fill="#F59E0B"/>
  <rect x="154" y="202" width="12" height="14" rx="3" fill="#6B7280"/>
  <text x="160" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#1E40AF">Inneres</text>
  <rect x="205" y="175" width="70" height="55" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
  <circle cx="240" cy="192" r="10" fill="#F59E0B"/>
  <rect x="234" y="202" width="12" height="14" rx="3" fill="#6B7280"/>
  <text x="240" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#1E40AF">Verteidigung</text>
  <rect x="285" y="175" width="70" height="55" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
  <circle cx="320" cy="192" r="10" fill="#F59E0B"/>
  <rect x="314" y="202" width="12" height="14" rx="3" fill="#6B7280"/>
  <text x="320" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#1E40AF">Auswärtiges</text>
  <!-- Richtlinienkompetenz label -->
  <rect x="90" y="248" width="220" height="30" rx="8" fill="#1E40AF"/>
  <text x="200" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Richtlinienkompetenz</text>
</svg>