<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="#F0FDF4"/>
  <!-- Title -->
  <text x="200" y="30" text-anchor="middle" font-size="14" fill="#1F2937" font-weight="bold">Wie wird man Sch&#246;ffe?</text>
  <!-- Step 1: Citizens volunteer -->
  <rect x="20" y="50" width="100" height="90" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="70" y="68" text-anchor="middle" font-size="9" fill="#1E40AF" font-weight="bold">1. Bewerbung</text>
  <!-- Group of citizens -->
  <circle cx="50" cy="95" r="10" fill="#FDDCB5"/>
  <rect x="43" y="104" width="14" height="16" rx="3" fill="#60A5FA"/>
  <circle cx="70" cy="95" r="10" fill="#FDDCB5"/>
  <rect x="63" y="104" width="14" height="16" rx="3" fill="#34D399"/>
  <circle cx="90" cy="95" r="10" fill="#FDDCB5"/>
  <rect x="83" y="104" width="14" height="16" rx="3" fill="#F59E0B"/>
  <text x="70" y="135" text-anchor="middle" font-size="7" fill="#1E40AF">B&#252;rger melden sich</text>
  <!-- Arrow 1->2 -->
  <path d="M125 95 L145 95" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowhead)"/>
  <!-- Step 2: Municipality selects -->
  <rect x="150" y="50" width="100" height="90" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="200" y="68" text-anchor="middle" font-size="9" fill="#92400E" font-weight="bold">2. Vorschlag</text>
  <!-- Municipality building -->
  <rect x="175" y="85" width="50" height="35" rx="4" fill="#D97706"/>
  <rect x="180" y="90" width="15" height="12" rx="2" fill="#FEF3C7"/>
  <rect x="200" y="90" width="15" height="12" rx="2" fill="#FEF3C7"/>
  <rect x="193" y="105" width="14" height="15" rx="2" fill="#78350F"/>
  <polygon points="175,85 200,70 225,85" fill="#92400E"/>
  <text x="200" y="135" text-anchor="middle" font-size="7" fill="#92400E">Gemeinde w&#228;hlt aus</text>
  <!-- Arrow 2->3 -->
  <path d="M255 95 L275 95" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowhead)"/>
  <!-- Step 3: Court appoints -->
  <rect x="280" y="50" width="100" height="90" rx="10" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="330" y="68" text-anchor="middle" font-size="9" fill="#065F46" font-weight="bold">3. Ernennung</text>
  <!-- Scales of justice -->
  <line x1="330" y1="82" x2="330" y2="105" stroke="#065F46" stroke-width="2"/>
  <line x1="310" y1="90" x2="350" y2="90" stroke="#065F46" stroke-width="2"/>
  <path d="M310 90 L305 105 L315 105 Z" fill="#10B981"/>
  <path d="M350 90 L345 105 L355 105 Z" fill="#10B981"/>
  <circle cx="330" cy="82" r="4" fill="#065F46"/>
  <text x="330" y="135" text-anchor="middle" font-size="7" fill="#065F46">Gericht ernennt</text>
  <!-- Requirements section -->
  <rect x="20" y="160" width="360" height="120" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="200" y="180" text-anchor="middle" font-size="11" fill="#1E40AF" font-weight="bold">Voraussetzungen</text>
  <!-- Requirement items -->
  <circle cx="50" cy="200" r="8" fill="#3B82F6"/>
  <text x="50" y="203" text-anchor="middle" font-size="10" fill="#FFFFFF">&#x2713;</text>
  <text x="65" y="203" font-size="9" fill="#1F2937">Deutsche Staatsb&#252;rgerschaft</text>
  <circle cx="50" cy="222" r="8" fill="#3B82F6"/>
  <text x="50" y="225" text-anchor="middle" font-size="10" fill="#FFFFFF">&#x2713;</text>
  <text x="65" y="225" font-size="9" fill="#1F2937">Alter: 25&#8211;69 Jahre</text>
  <circle cx="50" cy="244" r="8" fill="#3B82F6"/>
  <text x="50" y="247" text-anchor="middle" font-size="10" fill="#FFFFFF">&#x2713;</text>
  <text x="65" y="247" font-size="9" fill="#1F2937">Keine Vorstrafen</text>
  <circle cx="50" cy="266" r="8" fill="#3B82F6"/>
  <text x="50" y="269" text-anchor="middle" font-size="10" fill="#FFFFFF">&#x2713;</text>
  <text x="65" y="269" font-size="9" fill="#1F2937">Ehrenamtliche T&#228;tigkeit (5 Jahre)</text>
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0 0 L8 3 L0 6 Z" fill="#6B7280"/>
    </marker>
  </defs>
</svg>